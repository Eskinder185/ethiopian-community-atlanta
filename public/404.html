<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ethiopian Community Association in Atlanta</title>
    <script>
      (function () {
        var segmentCount = 1;
        var l = window.location;
        var repoBase = l.pathname.split("/").slice(0, 1 + segmentCount).join("/") + "/";
        var route =
          l.pathname
            .slice(1)
            .split("/")
            .slice(segmentCount)
            .join("/")
            .replace(/&/g, "~and~") || "";
        var search = l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "";
        l.replace(repoBase + "?p=/" + route + search + l.hash);
      })();
    </script>
  </head>
  <body></body>
</html>
