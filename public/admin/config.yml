                  - { label: Link path, name: path, widget: string }
              - label: Resources links
                name: resourcesLinks
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: Link label, name: label, widget: string }
                  - { label: Link path, name: path, widget: string }
              - label: External form links
                name: externalForms
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: Link label, name: label, widget: string }
                  - { label: URL, name: url, widget: string }
