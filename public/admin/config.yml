# =============================================================================
# ECAA Decap CMS Configuration
# Ethiopian Community Association in Atlanta
# =============================================================================
#
# LOCAL EDITING (developers):
#   Run: npm run dev
#   Open: http://localhost:5173/admin/index.html
#   Requires decap-server (started automatically with npm run dev).
#   local_backend is enabled below for no-login local editing.
#
# PRODUCTION EDITING (team members):
#   Before non-technical editors can save changes in production:
#   1. Connect this repository to GitHub and your hosting provider (Netlify recommended).
#   2. Configure authentication (Netlify Identity + Git Gateway, or GitHub OAuth).
#   3. Replace site_url, display_url, and branch below.
#   4. Comment out or remove local_backend for production deploys.
#   5. Invite editors — they should use /admin, not edit React code directly.
#
# EDITORS: Use friendly labels in the admin. Write short descriptions.
# Use TODO for unconfirmed official details. Do not invent prices, dates, or policies.
#
# =============================================================================

backend:
  name: git-gateway
  branch: main # TODO: Set before production deploy

# Local backend — no authentication required on localhost
local_backend: true

# Optional: use editorial workflow (Draft → In Review → Ready)
# publish_mode: editorial_workflow

site_url: https://your-domain.com # TODO: Production website URL
display_url: https://your-domain.com # TODO: URL shown in CMS header
logo_url: /favicon.svg

media_folder: public/uploads
public_folder: /uploads

slug:
  encoding: unicode
  clean_accents: true

collections:
  # ---------------------------------------------------------------------------
  # Site Information
  # ---------------------------------------------------------------------------
  - name: site
    label: Site Information
    files:
      - name: siteInfo
        label: Site Information
        file: src/content/siteInfo.json
        description: Organization name, tagline, primary links, and SEO settings used across the website.
        fields:
          - { label: Organization name, name: name, widget: string, hint: "Full legal organization name." }
          - { label: Short name, name: shortName, widget: string, hint: "Abbreviation shown in badges and compact areas (e.g. ECAA)." }
          - { label: Tagline, name: tagline, widget: string, hint: "Short phrase describing ECAA's mission." }
          - { label: Site description, name: description, widget: text, hint: "Longer description used in page content and summaries." }
          - label: Location
            name: location
            widget: object
            fields:
              - { label: City, name: city, widget: string }
              - { label: State, name: state, widget: string }
              - { label: Country, name: country, widget: string }
          - { label: Membership form URL, name: membershipFormUrl, widget: string, hint: "Public Jotform membership registration link." }
          - { label: Fundraising form URL, name: fundraisingFormUrl, widget: string, hint: "Public donation/fundraising form link." }
          - label: SEO / Meta
            name: meta
            widget: object
            fields:
              - { label: Browser title, name: title, widget: string }
              - { label: Meta description, name: description, widget: text, hint: "Use TODO if not confirmed." }

  # ---------------------------------------------------------------------------
  # Homepage
  # ---------------------------------------------------------------------------
  - name: homepage
    label: Home Page
    files:
      - name: homepage
        label: Home Page (Featured Sections)
        file: src/content/homepage.json
        description: Curated Home page content only. This does not change the full Events, Media, or Programs pages.
        fields:
          - label: Hero section
            name: hero
            widget: object
            hint: "This content appears only on the Home page."
            fields:
              - { label: Show this section?, name: visible, widget: boolean, default: true }
              - { label: Eyebrow text, name: eyebrow, widget: string }
              - { label: Hero title, name: title, widget: text, hint: "Use a line break for a balanced two-line heading." }
              - { label: Short description, name: description, widget: text, hint: "Use TODO if details are not confirmed." }
              - { label: Trust message below buttons, name: trustCue, widget: string, required: false }
              - label: Primary button
                name: primaryCta
                widget: object
                fields:
                  - { label: Button label, name: label, widget: string }
                  - { label: Button link, name: href, widget: string }
              - label: Secondary button
                name: secondaryCta
                widget: object
                fields:
                  - { label: Button label, name: label, widget: string }
                  - { label: Button link, name: href, widget: string }
              - label: Support button
                name: supportCta
                widget: object
                fields:
                  - { label: Button label, name: label, widget: string }
                  - { label: Button link, name: href, widget: string }
              - { label: Hero image path, name: image, widget: string, required: false, hint: "Optional. Example: /images/home-hero-community-atlanta.jpg" }
              - { label: Hero image alt text, name: imageAlt, widget: string, required: false }
          - label: Featured Events & News
            name: featuredEvents
            widget: object
            hint: "Choose up to 3 featured events for the Home page only. Do not add every event here."
            fields:
              - { label: Show this section?, name: visible, widget: boolean, default: true }
              - { label: Section eyebrow, name: eyebrow, widget: string }
              - { label: Section heading, name: title, widget: string }
              - { label: Short description, name: description, widget: text }
              - label: Featured event cards
                name: items
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: Item ID, name: id, widget: string }
                  - { label: Event title, name: title, widget: string, hint: "Use TODO if not confirmed." }
                  - { label: Date, name: date, widget: string, required: false }
                  - { label: Category, name: category, widget: string, required: false }
                  - { label: Short excerpt, name: excerpt, widget: text }
                  - { label: Button link, name: href, widget: string }
                  - { label: Button label, name: ctaLabel, widget: string, default: "Learn More" }
                  - { label: Image path, name: image, widget: string, required: false }
                  - { label: Image alt text, name: imageAlt, widget: string, required: false }
                  - { label: Source event ID, name: sourceEventId, widget: string, required: false, hint: "Optional link to events.json item." }
                  - { label: Notes, name: notes, widget: text, required: false }
              - { label: Empty-state caption, name: emptyCaption, widget: string, required: false, hint: "Shown below preview cards when no featured events are selected." }
              - label: Preview cards when empty
                name: placeholderItems
                widget: list
                required: false
                summary: "{{fields.title}}"
                fields:
                  - { label: Item ID, name: id, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Category, name: category, widget: string, required: false }
                  - { label: Short excerpt, name: excerpt, widget: text, required: false }
                  - { label: Image path, name: image, widget: string, required: false }
                  - { label: Image alt text, name: imageAlt, widget: string, required: false }
              - label: Section button
                name: sectionCta
                widget: object
                fields:
                  - { label: Button label, name: label, widget: string }
                  - { label: Button link, name: href, widget: string }
          - label: Featured Media
            name: featuredMedia
            widget: object
            hint: "Choose featured photos and videos for the Home page collage only."
            fields:
              - { label: Show this section?, name: visible, widget: boolean, default: true }
              - { label: Section eyebrow, name: eyebrow, widget: string }
              - { label: Section heading, name: title, widget: string }
              - { label: Short description, name: description, widget: text }
              - { label: Layout style, name: layout, widget: string, default: collage }
              - label: Featured media items
                name: items
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: Item ID, name: id, widget: string }
                  - label: Media type
                    name: type
                    widget: select
                    options: [image, video]
                  - { label: Title, name: title, widget: string }
                  - { label: Image path, name: src, widget: string, required: false }
                  - { label: Alt text, name: alt, widget: string, required: false }
                  - { label: YouTube URL, name: youtubeUrl, widget: string, required: false }
                  - { label: Embed URL, name: embedUrl, widget: string, required: false }
                  - { label: Thumbnail URL, name: thumbnailUrl, widget: string, required: false }
                  - { label: Category, name: category, widget: string, required: false }
                  - label: Collage size
                    name: featuredSize
                    widget: select
                    options: [large, wide, small]
                  - { label: Link, name: href, widget: string, required: false, hint: "Optional. Example: /media" }
                  - { label: Source media ID, name: sourceMediaId, widget: string, required: false }
                  - { label: Notes, name: notes, widget: text, required: false }
              - label: Section button
                name: sectionCta
                widget: object
                fields:
                  - { label: Button label, name: label, widget: string }
                  - { label: Button link, name: href, widget: string }
          - label: Book a Hall
            name: bookHall
            widget: object
            hint: "Home page hall booking section. If official form is not ready, use /contact."
            fields:
              - { label: Show this section?, name: visible, widget: boolean, default: true }
              - { label: Section eyebrow, name: eyebrow, widget: string }
              - { label: Section heading, name: title, widget: string }
              - { label: Short description, name: description, widget: text }
              - label: Book a Hall details
                name: details
                widget: list
                field: { label: Detail line, name: detail, widget: string }
              - label: Use case chips
                name: useCases
                widget: list
                required: false
                field: { label: Use case, name: useCase, widget: string }
              - label: Primary button
                name: primaryCta
                widget: object
                fields:
                  - { label: Button label, name: label, widget: string }
                  - { label: Button link, name: href, widget: string }
              - label: Secondary button
                name: secondaryCta
                widget: object
                fields:
                  - { label: Button label, name: label, widget: string }
                  - { label: Button link, name: href, widget: string }
              - { label: Image path, name: image, widget: string, required: false }
              - { label: Image alt text, name: imageAlt, widget: string, required: false }
              - { label: Notes, name: notes, widget: text, required: false }
          - label: Featured Programs & Services
            name: featuredPrograms
            widget: object
            hint: "Choose 4 to 6 featured programs for the Home page only."
            fields:
              - { label: Show this section?, name: visible, widget: boolean, default: true }
              - { label: Section eyebrow, name: eyebrow, widget: string }
              - { label: Section heading, name: title, widget: string }
              - { label: Short description, name: description, widget: text }
              - label: Featured program cards
                name: items
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: Item ID, name: id, widget: string }
                  - { label: Program title, name: title, widget: string }
                  - { label: Short description, name: shortDescription, widget: text }
                  - { label: Button link, name: href, widget: string }
                  - { label: Icon key, name: icon, widget: string, required: false }
                  - { label: Image path, name: image, widget: string, required: false }
                  - { label: Image alt text, name: imageAlt, widget: string, required: false }
                  - { label: Source program ID, name: sourceProgramId, widget: string, required: false }
                  - { label: Notes, name: notes, widget: text, required: false }
              - label: Section button
                name: sectionCta
                widget: object
                fields:
                  - { label: Button label, name: label, widget: string }
                  - { label: Button link, name: href, widget: string }

  # ---------------------------------------------------------------------------
  # Membership
  # ---------------------------------------------------------------------------
  - name: membership
    label: Membership
    files:
      - name: membership
        label: Membership Page
        file: src/content/membership.json
        description: Membership page intro, options, checklist, registration CTA, and EDIR disclosure note.
        fields:
          - label: Page hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Page title, name: title, widget: string }
              - { label: Short description, name: description, widget: text, hint: "Write a short description. Avoid long paragraphs." }
          - label: Membership options section
            name: optionsSection
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Section title, name: title, widget: string }
              - { label: Short description, name: description, widget: text }
          - label: Membership option cards
            name: options
            widget: list
            summary: "{{fields.title}}"
            hint: "Do not invent membership pricing. Use TODO for unclear official details."
            fields:
              - { label: Option ID, name: id, widget: string }
              - { label: Card title, name: title, widget: string }
              - { label: Short summary, name: summary, widget: text }
              - label: Checklist / details
                name: details
                widget: list
                field: { label: Detail line, name: detail, widget: string }
              - { label: Highlight this option?, name: highlight, widget: boolean, default: false }
              - { label: Publish this option?, name: published, widget: boolean, default: true }
          - label: Before you start checklist
            name: beforeYouStart
            widget: object
            fields:
              - { label: Section title, name: title, widget: string }
              - { label: Short description, name: description, widget: text }
              - label: Checklist items
                name: items
                widget: list
                field: { label: Checklist item, name: item, widget: string }
          - label: Registration section
            name: registration
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Section title, name: title, widget: string }
              - { label: Short description, name: description, widget: text }
              - { label: CTA card title, name: ctaTitle, widget: string }
              - { label: CTA description, name: ctaDescription, widget: text }
              - { label: Button label, name: ctaLabel, widget: string }
              - { label: Important note, name: importantNote, widget: text, required: false }
          - { label: EDIR disclosure note, name: edirDisclosure, widget: text, hint: "Legal/disclosure language for EDIR. Do not invent official policy." }
          - label: Related links
            name: relatedLinks
            widget: object
            required: false
            fields:
              - { label: Section title, name: title, widget: string }
              - { label: Short description, name: description, widget: text }
              - label: Links
                name: links
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: Link label, name: label, widget: string }
                  - { label: Link path, name: path, widget: string }
          - label: FAQ section heading
            name: faqSection
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Section title, name: title, widget: string }
              - { label: Short description, name: description, widget: text }

  # ---------------------------------------------------------------------------
  # Programs & Services
  # ---------------------------------------------------------------------------
  - name: programs
    label: Programs & Services
    files:
      - name: programs
        label: Programs & Services
        file: src/content/programs.json
        description: Programs page sections, community program cards, forms area, and education/training cards.
        fields:
          - label: Programs overview section
            name: overview
            widget: object
            fields:
              - { label: Section title, name: title, widget: string }
              - { label: Short description, name: description, widget: text }
          - label: Program categories
            name: categories
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Program ID (slug), name: id, widget: string, hint: "Used for URL anchors. Keep stable once published." }
              - { label: Initials badge, name: initials, widget: string, hint: "Example: CS, CP, YE. Used when image is blank." }
              - { label: Program category, name: category, widget: string }
              - { label: Program title, name: title, widget: string }
              - { label: Short description, name: description, widget: text }
              - { label: Program image, name: image, widget: image, required: false, hint: "Leave blank to use the initials placeholder." }
              - { label: Image description, name: imageAlt, widget: string, required: false }
              - { label: Feature this program?, name: featured, widget: boolean, default: true, required: false }
              - { label: Publish this program?, name: published, widget: boolean, default: true }
              - label: Program form callout (optional)
                name: form
                widget: object
                required: false
                fields:
                  - { label: Form title, name: title, widget: string, required: false }
                  - { label: Form description, name: description, widget: text, required: false }
                  - { label: Form link, name: url, widget: string, required: false, hint: "Add the official form link when it is ready." }
                  - { label: Button label, name: ctaLabel, widget: string, required: false }
                  - { label: Publish form callout?, name: published, widget: boolean, default: true, required: false }
                  - { label: Internal notes, name: notes, widget: text, required: false, hint: "Use notes for internal reminders. Notes do not appear publicly." }
              - { label: Internal notes, name: notes, widget: text, required: false, hint: "Use notes for internal reminders. Notes do not appear publicly." }
          - label: Education & Training section
            name: educationTraining
            widget: object
            fields:
              - { label: Section ID, name: id, widget: string }
              - { label: Section label, name: eyebrow, widget: string, required: false }
              - { label: Section title, name: title, widget: string }
              - { label: Introduction, name: intro, widget: text }
              - { label: Schedule note, name: scheduleNote, widget: text, required: false, hint: "Do not add unverified dates or prices." }
              - label: Training topics
                name: topics
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: Topic ID, name: id, widget: string }
                  - { label: Initials badge, name: initials, widget: string, required: false, hint: "Example: SN, YE, CW." }
                  - { label: Topic category, name: category, widget: string }
                  - { label: Topic title, name: title, widget: string }
                  - { label: Subtitle, name: subtitle, widget: string, required: false }
                  - { label: Description, name: description, widget: text }
                  - { label: Topic image, name: image, widget: image, required: false, hint: "Leave blank to use initials placeholder." }
                  - { label: Image description, name: imageAlt, widget: string, required: false }
                  - label: Status
                    name: status
                    widget: select
                    required: false
                    options: [coming-soon, active]
                  - { label: Publish this topic?, name: published, widget: boolean, default: true }
                  - { label: Internal notes, name: notes, widget: text, required: false, hint: "Use notes for internal reminders. Notes do not appear publicly." }
          - label: Program forms section
            name: formsSection
            widget: object
            fields:
              - { label: Section title, name: title, widget: string }
              - { label: Short description, name: description, widget: text }
              - { label: Contact page path, name: contactPath, widget: string, required: false }
          - label: Final CTA section
            name: closingCta
            widget: object
            fields:
              - { label: Heading, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - label: Buttons
                name: buttons
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: Button label, name: label, widget: string }
                  - { label: Button link, name: href, widget: string }

  # ---------------------------------------------------------------------------
  # Events & News
  # ---------------------------------------------------------------------------
  - name: events
    label: Events & News
    files:
      - name: events
        label: Events & News
        file: src/content/events.json
        description: Upcoming events, announcements, community news, past events, and hall booking info.
        fields:
          - label: Empty state messages
            name: emptyStates
            widget: object
            fields:
              - label: Upcoming events
                name: upcoming
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
              - label: Announcements
                name: announcements
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
              - label: Community news
                name: communityNews
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
              - label: Past events
                name: past
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
          - label: Upcoming events
            name: upcoming
            widget: list
            summary: "{{fields.title}}"
            hint: "Status: upcoming. Use TODO if date is not confirmed."
            fields:
              - { label: Event ID (slug), name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Date, name: date, widget: string, hint: "YYYY-MM-DD or readable date." }
              - { label: Time, name: time, widget: string, required: false }
              - { label: Location, name: location, widget: string, required: false }
              - { label: Short excerpt, name: summary, widget: text }
              - { label: Full description, name: description, widget: text, required: false }
              - { label: Registration URL, name: registrationUrl, widget: string, required: false }
              - { label: Button link, name: link, widget: string, required: false }
              - { label: Feature this item?, name: featured, widget: boolean, default: false, required: false }
              - { label: Publish?, name: published, widget: boolean, default: false }
          - label: Announcements
            name: announcements
            widget: list
            summary: "{{fields.title}}"
            hint: "Status: announcement."
            fields:
              - { label: Item ID (slug), name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Date, name: date, widget: string, required: false }
              - { label: Short excerpt, name: summary, widget: text }
              - { label: Body, name: body, widget: text, required: false }
              - { label: Link URL, name: link, widget: string, required: false }
              - { label: Source or notes, name: notes, widget: text, required: false }
              - { label: Publish?, name: published, widget: boolean, default: false }
          - label: Community news
            name: communityNews
            widget: list
            summary: "{{fields.title}}"
            hint: "Status: community-news."
            fields:
              - { label: Item ID (slug), name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Date, name: date, widget: string, required: false }
              - { label: Short excerpt, name: summary, widget: text }
              - { label: Body, name: body, widget: text, required: false }
              - { label: Link URL, name: link, widget: string, required: false }
              - { label: Source or notes, name: notes, widget: text, required: false }
              - { label: Publish?, name: published, widget: boolean, default: false }
          - label: Past events
            name: past
            widget: list
            summary: "{{fields.title}}"
            hint: "Status: past."
            fields:
              - { label: Event ID (slug), name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Date, name: date, widget: string, required: false }
              - { label: Location, name: location, widget: string, required: false }
              - { label: Short excerpt, name: summary, widget: text }
              - { label: Recap URL, name: recapUrl, widget: string, required: false }
              - label: Image
                name: image
                widget: object
                required: false
                fields:
                  - { label: Image file or URL, name: src, widget: image, required: false, hint: "Upload an image or choose an existing one." }
                  - { label: Alt text, name: alt, widget: string, required: false }
              - { label: Publish?, name: published, widget: boolean, default: false }
          - label: Book the Event Hall
            name: bookHall
            widget: object
            fields:
              - { label: Section ID, name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Important note, name: importantNote, widget: text }
              - label: Good for (event types)
                name: goodFor
                widget: list
                field: { label: Event type, name: eventType, widget: string }
              - { label: Contact email, name: email, widget: string }
              - { label: Email subject, name: subject, widget: string }
              - { label: Email body template, name: bodyTemplate, widget: text }

  # ---------------------------------------------------------------------------
  # Leadership
  # ---------------------------------------------------------------------------
  - name: leadership
    label: Leadership
    files:
      - name: teamMembers
        label: Leadership & Team
        file: src/content/teamMembers.json
        description: Executive Committee, Board of Directors, Audit Committee, Advisory Board, and Edir Committee.
        fields:
          - { label: Page intro paragraph, name: intro, widget: text, hint: "Shown at the top of the Leadership page." }
          - label: Committees
            name: groups
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Committee ID, name: id, widget: string }
              - { label: Committee name, name: title, widget: string }
              - { label: Committee description, name: description, widget: text }
              - { label: Page anchor, name: anchor, widget: string }
              - label: Committee members
                name: members
                widget: list
                summary: "{{fields.name}} — {{fields.title}}"
                hint: "Do not invent social links. Leave socials empty unless verified."
                fields:
                  - { label: Member ID, name: id, widget: string }
                  - { label: Name, name: name, widget: string }
                  - { label: Role / title, name: title, widget: string }
                  - { label: Profile image, name: image, widget: image, hint: "Upload image or paste image URL." }
                  - label: Social links
                    name: socials
                    widget: list
                    required: false
                    summary: "{{fields.platform}}"
                    fields:
                      - label: Platform
                        name: platform
                        widget: select
                        options: [facebook, linkedin, instagram, youtube, x, email]
                      - { label: URL, name: url, widget: string }
                  - { label: Notes, name: notes, widget: text, required: false }

  # ---------------------------------------------------------------------------
  # Documents
  # ---------------------------------------------------------------------------
  - name: documents
    label: Documents
    files:
      - name: documents
        label: Documents & PDFs
        file: src/content/documents.json
        description: Bylaws, election documents, meeting notices, public reports, and other files.
        fields:
          - label: Document categories
            name: categories
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Category ID, name: id, widget: string, hint: "bylaws, election-documents, meeting-notices, public-reports, or other." }
              - { label: Category title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Documents
            name: documents
            widget: list
